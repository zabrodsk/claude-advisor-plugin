<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" role="img" aria-label="Advisor plugin flow diagram">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="opusNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97757;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#cc785c;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="sonnetNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c8aa8;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#5a6a8a;stop-opacity:0.15" />
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#8a9bb5" opacity="0.7"/>
    </marker>
    <marker id="arr-opus" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#d97757" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bgGrad3)" rx="12"/>

  <!-- ── STEP 1: OPUS (top center) ── -->
  <rect x="320" y="28" width="260" height="72" rx="10" fill="url(#opusNodeGrad)" stroke="#d97757" stroke-width="1.5"/>
  <!-- Subtle inner glow -->
  <rect x="322" y="30" width="256" height="20" rx="9" fill="#d97757" opacity="0.06"/>

  <text x="450" y="56" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#d97757">OPUS</text>
  <text x="450" y="74" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#c4a898">reads · plans · decides</text>
  <text x="450" y="90" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8a7a72">dispatches via Agent tool (model: sonnet)</text>

  <!-- ── ARROWS: Opus → 3 Sonnets ── -->
  <!-- Left arrow -->
  <path d="M 370 100 Q 280 130 200 155" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.6" marker-end="url(#arr-opus)" stroke-dasharray="6 4"/>
  <!-- Center arrow -->
  <path d="M 450 100 L 450 155" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.6" marker-end="url(#arr-opus)" stroke-dasharray="6 4"/>
  <!-- Right arrow -->
  <path d="M 530 100 Q 620 130 700 155" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.6" marker-end="url(#arr-opus)" stroke-dasharray="6 4"/>

  <!-- "parallel" label -->
  <text x="450" y="132" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a9bb5" opacity="0.5" letter-spacing="1">parallel</text>

  <!-- ── STEP 2: THREE SONNET NODES ── -->
  <!-- Sonnet 1 (left) -->
  <rect x="100" y="158" width="200" height="68" rx="10" fill="url(#sonnetNodeGrad)" stroke="#7c8aa8" stroke-width="1.5"/>
  <rect x="102" y="160" width="196" height="16" rx="9" fill="#7c8aa8" opacity="0.06"/>
  <text x="200" y="183" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" letter-spacing="1.5" fill="#7c8aa8">SONNET</text>
  <text x="200" y="200" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10.5" fill="#8a9bb5">subtask A</text>
  <text x="200" y="216" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#6a7a8a">edits · writes · runs</text>

  <!-- Sonnet 2 (center) -->
  <rect x="350" y="158" width="200" height="68" rx="10" fill="url(#sonnetNodeGrad)" stroke="#7c8aa8" stroke-width="1.5"/>
  <rect x="352" y="160" width="196" height="16" rx="9" fill="#7c8aa8" opacity="0.06"/>
  <text x="450" y="183" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" letter-spacing="1.5" fill="#7c8aa8">SONNET</text>
  <text x="450" y="200" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10.5" fill="#8a9bb5">subtask B</text>
  <text x="450" y="216" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#6a7a8a">edits · writes · runs</text>

  <!-- Sonnet 3 (right) -->
  <rect x="600" y="158" width="200" height="68" rx="10" fill="url(#sonnetNodeGrad)" stroke="#7c8aa8" stroke-width="1.5"/>
  <rect x="602" y="160" width="196" height="16" rx="9" fill="#7c8aa8" opacity="0.06"/>
  <text x="700" y="183" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" letter-spacing="1.5" fill="#7c8aa8">SONNET</text>
  <text x="700" y="200" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10.5" fill="#8a9bb5">subtask C</text>
  <text x="700" y="216" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#6a7a8a">edits · writes · runs</text>

  <!-- ── ARROWS: 3 Sonnets → Opus review ── -->
  <!-- Left → center -->
  <path d="M 200 226 Q 280 256 370 278" fill="none" stroke="#7c8aa8" stroke-width="1.5" opacity="0.55" marker-end="url(#arr)"/>
  <!-- Center straight down -->
  <path d="M 450 226 L 450 278" fill="none" stroke="#7c8aa8" stroke-width="1.5" opacity="0.55" marker-end="url(#arr)"/>
  <!-- Right → center -->
  <path d="M 700 226 Q 620 256 530 278" fill="none" stroke="#7c8aa8" stroke-width="1.5" opacity="0.55" marker-end="url(#arr)"/>

  <!-- "merge" label -->
  <text x="450" y="258" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a9bb5" opacity="0.5" letter-spacing="1">merge</text>

  <!-- ── STEP 3: OPUS REVIEW (bottom center) ── -->
  <rect x="320" y="280" width="260" height="72" rx="10" fill="url(#opusNodeGrad)" stroke="#d97757" stroke-width="1.5"/>
  <rect x="322" y="282" width="256" height="20" rx="9" fill="#d97757" opacity="0.06"/>

  <text x="450" y="308" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#d97757">OPUS</text>
  <text x="450" y="326" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#c4a898">reviews · ships or corrects</text>
  <text x="450" y="342" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8a7a72">max 3 executor rounds, then surfaces blocker</text>

  <!-- ── STEP LABELS (left side) ── -->
  <text x="48" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a9bb5" opacity="0.5" transform="rotate(-90, 48, 72)">1</text>
  <text x="48" y="200" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a9bb5" opacity="0.5" transform="rotate(-90, 48, 200)">2</text>
  <text x="48" y="320" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a9bb5" opacity="0.5" transform="rotate(-90, 48, 320)">3</text>

  <!-- Step number circles -->
  <circle cx="48" cy="64" r="12" fill="none" stroke="#d97757" stroke-width="1" opacity="0.35"/>
  <text x="48" y="68" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#d97757" opacity="0.7">1</text>

  <circle cx="48" cy="192" r="12" fill="none" stroke="#7c8aa8" stroke-width="1" opacity="0.35"/>
  <text x="48" y="196" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#7c8aa8" opacity="0.7">2</text>

  <circle cx="48" cy="316" r="12" fill="none" stroke="#d97757" stroke-width="1" opacity="0.35"/>
  <text x="48" y="320" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#d97757" opacity="0.7">3</text>

</svg>
