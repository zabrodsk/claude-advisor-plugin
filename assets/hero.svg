<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Brains of Opus. Hands of Sonnet.">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="opusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc785c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sonnetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c8aa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a6a8a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-opus">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-sonnet">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97757" opacity="0.8"/>
    </marker>
    <!-- Animated dash pattern for flowing arrows -->
    <style>
      .flow-line { stroke-dasharray: 12 6; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- ── OPUS brain glyph (left side) ── -->
  <!-- Outer ring -->
  <circle cx="280" cy="200" r="90" fill="none" stroke="#d97757" stroke-width="2" opacity="0.3"/>
  <circle cx="280" cy="200" r="90" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.15" stroke-dasharray="4 8">
    <animateTransform attributeName="transform" type="rotate" from="0 280 200" to="360 280 200" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Brain core hexagon -->
  <polygon points="280,125 340,162 340,238 280,275 220,238 220,162" fill="#d97757" opacity="0.12" stroke="#d97757" stroke-width="1.5" filter="url(#glow-opus)"/>

  <!-- Brain internal lines (stylized neural paths) -->
  <g stroke="#d97757" stroke-width="1.5" opacity="0.6" stroke-linecap="round">
    <line x1="250" y1="170" x2="280" y2="200"/>
    <line x1="280" y1="200" x2="310" y2="170"/>
    <line x1="280" y1="200" x2="280" y2="240"/>
    <line x1="250" y1="170" x2="230" y2="185"/>
    <line x1="310" y1="170" x2="330" y2="185"/>
    <line x1="250" y1="170" x2="260" y2="148"/>
    <line x1="310" y1="170" x2="300" y2="148"/>
    <line x1="280" y1="240" x2="256" y2="252"/>
    <line x1="280" y1="240" x2="304" y2="252"/>
    <!-- Pulsing nodes -->
  </g>

  <!-- Neural nodes -->
  <g filter="url(#glow-opus)">
    <circle cx="280" cy="200" r="8" fill="#d97757">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="170" r="5" fill="#d97757" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="170" r="5" fill="#d97757" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="240" r="5" fill="#d97757" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="185" r="4" fill="#d97757" opacity="0.7"/>
    <circle cx="330" cy="185" r="4" fill="#d97757" opacity="0.7"/>
    <circle cx="260" cy="148" r="3.5" fill="#d97757" opacity="0.6"/>
    <circle cx="300" cy="148" r="3.5" fill="#d97757" opacity="0.6"/>
    <circle cx="256" cy="252" r="3.5" fill="#d97757" opacity="0.6"/>
    <circle cx="304" cy="252" r="3.5" fill="#d97757" opacity="0.6"/>
  </g>

  <!-- OPUS label -->
  <text x="280" y="318" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="600" letter-spacing="4" fill="#d97757" opacity="0.9">OPUS</text>
  <text x="280" y="335" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" fill="#d97757" opacity="0.5">reasons · plans · reviews</text>

  <!-- ── FLOWING ARROWS (center) ── -->
  <!-- Arrow 1: top path -->
  <path d="M 375 160 Q 520 100 640 140" fill="none" stroke="#d97757" stroke-width="1.8" opacity="0.7" marker-end="url(#arrowhead)" stroke-dasharray="10 5">
    <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <!-- Arrow 2: middle path -->
  <path d="M 375 200 L 640 200" fill="none" stroke="#d97757" stroke-width="1.8" opacity="0.85" marker-end="url(#arrowhead)" stroke-dasharray="10 5">
    <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.4;0.85" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <!-- Arrow 3: bottom path -->
  <path d="M 375 240 Q 520 300 640 260" fill="none" stroke="#d97757" stroke-width="1.8" opacity="0.7" marker-end="url(#arrowhead)" stroke-dasharray="10 5">
    <animate attributeName="stroke-dashoffset" from="60" to="0" dur="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.1s" repeatCount="indefinite"/>
  </path>

  <!-- "dispatches" label on center arrow -->
  <text x="508" y="194" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#d97757" opacity="0.5" letter-spacing="1">dispatches</text>

  <!-- ── SONNET execution glyphs (right side) ── -->
  <!-- Three execution nodes -->
  <!-- Node 1 (top) -->
  <g transform="translate(780, 140)" filter="url(#glow-sonnet)">
    <rect x="-38" y="-28" width="76" height="56" rx="8" fill="#7c8aa8" opacity="0.12" stroke="#7c8aa8" stroke-width="1.5"/>
    <g stroke="#7c8aa8" stroke-width="1.5" opacity="0.8" stroke-linecap="round">
      <line x1="-18" y1="-8" x2="18" y2="-8"/>
      <line x1="-18" y1="0" x2="8" y2="0"/>
      <line x1="-18" y1="8" x2="14" y2="8"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#7c8aa8" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2 (middle) -->
  <g transform="translate(780, 200)" filter="url(#glow-sonnet)">
    <rect x="-38" y="-28" width="76" height="56" rx="8" fill="#7c8aa8" opacity="0.15" stroke="#7c8aa8" stroke-width="1.5"/>
    <g stroke="#7c8aa8" stroke-width="1.5" opacity="0.8" stroke-linecap="round">
      <line x1="-18" y1="-8" x2="18" y2="-8"/>
      <line x1="-18" y1="0" x2="8" y2="0"/>
      <line x1="-18" y1="8" x2="14" y2="8"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#7c8aa8" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 3 (bottom) -->
  <g transform="translate(780, 260)" filter="url(#glow-sonnet)">
    <rect x="-38" y="-28" width="76" height="56" rx="8" fill="#7c8aa8" opacity="0.12" stroke="#7c8aa8" stroke-width="1.5"/>
    <g stroke="#7c8aa8" stroke-width="1.5" opacity="0.8" stroke-linecap="round">
      <line x1="-18" y1="-8" x2="18" y2="-8"/>
      <line x1="-18" y1="0" x2="8" y2="0"/>
      <line x1="-18" y1="8" x2="14" y2="8"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#7c8aa8" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.6s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- SONNET × 3 label -->
  <text x="780" y="318" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="600" letter-spacing="3" fill="#7c8aa8" opacity="0.9">SONNET × 3</text>
  <text x="780" y="335" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" fill="#7c8aa8" opacity="0.5">parallel execution</text>

  <!-- ── TAGLINE (center, bottom area) ── -->
  <text x="600" y="62" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#e8ddd5">Brains of Opus. Hands of Sonnet.</text>
  <text x="600" y="86" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#8a9bb5" letter-spacing="0.5">claude-advisor-plugin</text>

  <!-- Divider line under tagline -->
  <line x1="440" y1="96" x2="760" y2="96" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="600" y1="110" x2="600" y2="290" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <text x="600" y="207" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a9bb5" opacity="0.4">→</text>

  <!-- Cost badge (top right) -->
  <rect x="980" y="24" width="160" height="30" rx="6" fill="#2ea44f" opacity="0.15" stroke="#2ea44f" stroke-width="1"/>
  <text x="1060" y="44" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#2ea44f" opacity="0.85">~70% fewer tokens</text>

</svg>
